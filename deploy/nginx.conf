# Laplace Nginx 反向代理配置
# 用法：将此文件复制到服务器的 /etc/nginx/sites-available/laplace
#       然后 ln -s /etc/nginx/sites-available/laplace /etc/nginx/sites-enabled/
#       最后 nginx -t && systemctl reload nginx

upstream laplace_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;  # ← 替换为你的域名或公网 IP

    # ── 前端静态文件 ──
    # 方式一：直接由 Nginx 托管（推荐，性能最优）
    # 将 demo/ 目录复制到服务器上的 /var/www/laplace/
    root /var/www/laplace;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API 反向代理 ──
    location /api/ {
        proxy_pass http://laplace_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应必需：禁用缓冲，保持长连接
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── 健康检查（可选） ──
    location /health {
        proxy_pass http://laplace_backend/api/health;
    }
}

# ── HTTPS 版本（推荐使用 certbot 自动生成） ──
# sudo certbot --nginx -d your-domain.com
