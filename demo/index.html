<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Laplace — AI Native 对话式 FGO 数据助手">
  <title>Laplace — FGO 智能助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
  <script src="marked.min.js"></script>
</head>
<body>
  <!-- Header -->
  <header id="app-header">
    <div class="header-content">
      <div class="logo-group">
        <div class="logo-icon">⧫</div>
        <div class="logo-text">
          <h1>LAPLACE</h1>
          <span class="tagline">AI Native FGO Assistant</span>
        </div>
      </div>
      <div class="model-badge" id="model-badge" title="当前 AI 模型">
        <span class="model-dot"></span>
        <span id="model-name">Ready</span>
      </div>
    </div>
  </header>

  <!-- Chat Area -->
  <main id="chat-container">
    <div class="chat-messages" id="chat-messages">
      <!-- Welcome Message -->
      <div class="message assistant-message">
        <div class="message-avatar">⧫</div>
        <div class="message-content">
          <div class="message-bubble">
            <p>你好，Master！我是 <strong>Laplace</strong>，你的 FGO 数据助手。</p>
            <p>你可以用自然语言向我提问，例如：</p>
            <div class="suggestion-chips">
              <button class="chip" data-query="帮我找一下 30 自充的从者有哪些">30 自充的从者</button>
              <button class="chip" data-query="大于 50 自充的从者有哪些">50% 以上自充</button>
              <button class="chip" data-query="五星 Caster 有自充的从者">五星 Caster 自充</button>
              <button class="chip" data-query="四星以上的 Berserker 有哪些">四星以上狂阶</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Chat Input -->
  <div id="chat-input-area">
    <div class="input-wrapper">
      <input type="text" id="chat-input" placeholder="输入你的问题... 例如「30 自充的从者有哪些」" autocomplete="off">
      <button id="send-btn" title="发送">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span>数据源自 <a href="https://atlasacademy.io/" target="_blank">Atlas Academy</a> · 逻辑参考 <a href="https://github.com/chaldea-center/chaldea" target="_blank">Chaldea</a></span>
    </div>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
