<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Laplace — AI Native 对话式 FGO 数据助手">
  <title>Laplace — FGO 智能助手</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=9">
  <script src="marked.min.js"></script>
</head>
<body>
  <!-- Header -->
  <header id="app-header">
    <div class="header-content">
      <div class="logo-group">
        <div class="logo-icon">⧫</div>
        <div class="logo-text">
          <h1>LAPLACE</h1>
          <span class="tagline">AI Native FGO Assistant</span>
        </div>
      </div>
      <div class="model-badge" id="model-badge" title="当前 AI 模型">
        <span class="model-dot"></span>
        <span id="model-name">Ready</span>
      </div>
      <div class="header-actions">
        <button id="new-chat-btn" class="icon-btn" title="新建对话">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button id="history-btn" class="icon-btn" title="历史会话">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </button>
        <button id="clear-btn" class="icon-btn" title="清空当前对话">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
        <button id="help-btn" class="icon-btn" title="使用说明">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Chat Area -->
  <main id="chat-container">
    <div class="chat-messages" id="chat-messages">
      <!-- Welcome message will be injected by app.js -->
    </div>
  </main>

  <!-- Chat Input -->
  <div id="chat-input-area">
    <div id="preset-bar" class="preset-bar">
      <!-- Preset tabs rendered by app.js -->
    </div>
    <div class="input-wrapper">
      <span id="preset-pill" class="preset-pill hidden"></span>
      <input type="text" id="chat-input" placeholder="输入你的问题... 例如「30 自充的从者有哪些」" autocomplete="off">
      <button id="send-btn" title="发送">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span>数据源自 <a href="https://atlasacademy.io/" target="_blank">Atlas Academy</a> · 逻辑参考 <a href="https://github.com/chaldea-center/chaldea" target="_blank">Chaldea</a></span>
      <span class="disclaimer">本项目为个人学习与技术验证用途，处于内部测试阶段，尚未正式上线运营。数据来源于第三方开源 API，内容仅供参考，不构成任何商业服务。本站与 TYPE-MOON / Lasengle / Aniplex 无任何关联。</span>
    </div>
  </div>

  <script src="app.js?v=9"></script>
</body>
</html>
